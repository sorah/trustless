name: binaries

permissions:
  contents: write

on:
  push:
    tags:
      - 'trustless/v[0-9]+*'
      - 'trustless-provider-filesystem/v[0-9]+*'
      - 'trustless-provider-lambda/v[0-9]+*'

env:
  MACOSX_DEPLOYMENT_TARGET: '11.0' # Big Sur, first macOS release with Apple Silicon support

jobs:
  upload-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Determine binary name from tag
        id: meta
        run: echo "bin=${GITHUB_REF_NAME%%/*}" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/setup
        with: { target: "${{ matrix.target }}", rust-toolchain: 'false' }
      - uses: taiki-e/setup-cross-toolchain-action@b8d1a322a6009a2b7220f53996695778eef89b41 # v1.38.0
        with:
          target: "${{ matrix.target }}"
      - uses: taiki-e/upload-rust-binary-action@f391289bcff6a7f36b6301c0a74199657bbb4561 # v1.28.0
        with:
          bin: ${{ steps.meta.outputs.bin }}
          target: '${{ matrix.target }}'
          tar: unix
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-lambda-function:
    if: startsWith(github.ref_name, 'trustless-provider-lambda/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - lambda-arch: arm64
            arch-suffix: arm64
          - lambda-arch: x86-64
            arch-suffix: x86_64
    runs-on: ubuntu-latest
    outputs:
      sha512-arm64: ${{ steps.sha512.outputs.sha512-arm64 }}
      sha512-x86_64: ${{ steps.sha512.outputs.sha512-x86_64 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: cargo-bins/cargo-binstall@main
      - uses: step-security/setup-zig@190f429650adf2a785549867b458a8a37b0077a4 # v2.2.1
      - run: cargo binstall --no-confirm cargo-lambda
      - run: cargo lambda build --release --${{ matrix.lambda-arch }} --output-format zip -p trustless-backend-lambda
      - run: mv "target/lambda/bootstrap/bootstrap.zip" "target/lambda/bootstrap/trustless-backend-lambda.${{ matrix.arch-suffix }}.zip"
      - run: gh release upload "${{ github.ref_name }}" "target/lambda/bootstrap/trustless-backend-lambda.${{ matrix.arch-suffix }}.zip" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute source_sha512
        id: sha512
        run: |
          hash=$(base64 -w 0 < "target/lambda/bootstrap/trustless-backend-lambda.${{ matrix.arch-suffix }}.zip" | sha512sum | awk '{print $1}')
          echo "sha512-${{ matrix.arch-suffix }}=${hash}" >> "$GITHUB_OUTPUT"

  update-release-description:
    if: startsWith(github.ref_name, 'trustless-provider-lambda/')
    needs: upload-lambda-function
    runs-on: ubuntu-slim
    steps:
      - name: Append deploy info to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA512_ARM64: ${{ needs.upload-lambda-function.outputs.sha512-arm64 }}
          SHA512_X86_64: ${{ needs.upload-lambda-function.outputs.sha512-x86_64 }}
        run: |
          encoded_tag="${GITHUB_REF_NAME/\//%2F}"
          existing_body="$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json body -q '.body')"
          base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${encoded_tag}"
          deploy_block="$(printf '\n#### Deploy\n\nNote: These sums are `sha512_hex(base64(zip blob))` due to Terraform limitation.\n\n##### arm64\n\n```tf\nsource_url    = "%s/trustless-backend-lambda.arm64.zip"\nsource_sha512 = "%s"\n```\n\n##### x86_64\n\n```tf\nsource_url    = "%s/trustless-backend-lambda.x86_64.zip"\nsource_sha512 = "%s"\n```' "$base_url" "$SHA512_ARM64" "$base_url" "$SHA512_X86_64")"
          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --notes "${existing_body}${deploy_block}"
