name: binaries

permissions:
  contents: write

on:
  push:
    tags:
      - 'trustless/v[0-9]+*'
      - 'trustless-provider-lambda/v[0-9]+*'

env:
  MACOSX_DEPLOYMENT_TARGET: '11.0' # Big Sur, first macOS release with Apple Silicon support

jobs:
  upload-binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: universal-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
        with: { target: "${{ matrix.target }}", rust-toolchain: 'false' }
      - uses: taiki-e/setup-cross-toolchain-action@b8d1a322a6009a2b7220f53996695778eef89b41 # v1.38.0
        with:
          target: "${{ matrix.target }}"
      - uses: taiki-e/upload-rust-binary-action@f391289bcff6a7f36b6301c0a74199657bbb4561 # v1.28.0
        with:
          bin: trustless,trustless-provider-lambda
          target: '${{ matrix.target }}'
          tar: unix
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-lambda-function:
    if: startsWith(github.ref_name, 'trustless-provider-lambda/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm cargo-lambda
      - run: cargo lambda build --release --arm64 -p trustless-provider-lambda-function
      - name: upload lambda zip
        run: |
          cd target/lambda/bootstrap
          zip trustless-provider-lambda-function.zip bootstrap
          gh release upload "${{ github.ref_name }}" trustless-provider-lambda-function.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
